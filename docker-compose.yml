services:
  # =========================
  # Laravel PHP-FPM
  # =========================
  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: yourevent-php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      # Single project mount avoids duplicate overlay on storage and permission surprises.
      - ./backend:/var/www/html
    networks:
      - yourevent-network
    depends_on:
      - mysql
      - redis
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      # Must match the browser URL (nginx :8080) or Livewire/Filament POST to wrong origin and login breaks.
      APP_URL: http://localhost:8080
      DB_HOST: mysql
      DB_DATABASE: yourevent
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    command: ["php-fpm"]

  # =========================
  # Nginx (Laravel)
  # =========================
  nginx:
    image: nginx:alpine
    container_name: yourevent-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - yourevent-network
    depends_on:
      - php

  # =========================
  # Next.js Frontend
  # =========================
  node:
    build:
      context: .
      dockerfile: ./docker/node/Dockerfile
    container_name: yourevent-node
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    networks:
      - yourevent-network
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://nginx:80
      NEXT_PUBLIC_APP_URL: http://localhost:3000

  # =========================
  # MySQL
  # =========================
  mysql:
    image: mysql:8.0
    container_name: yourevent-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: yourevent
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - yourevent-network

  # =========================
  # Redis
  # =========================
  redis:
    image: redis:7-alpine
    container_name: yourevent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - yourevent-network
    command: redis-server --appendonly yes

# =========================
# Networks
# =========================
networks:
  yourevent-network:
    driver: bridge

# =========================
# Volumes
# =========================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local